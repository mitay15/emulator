name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit ruff isort black mypy pytest bandit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files
      - name: Run tests
        run: pytest -q
      - name: Type check
        run: mypy .
      - name: Security audit
        run: bandit -r .
