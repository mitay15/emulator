name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  checks:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest bandit coverage pytest-cov

      # -----------------------------
      # Linting
      # -----------------------------
      - name: Ruff (lint + fix)
        run: ruff check . --fix

      # -----------------------------
      # Type checking (uses mypy.ini)
      # -----------------------------
      - name: Mypy
        run: mypy

      # -----------------------------
      # Security audit
      # -----------------------------
      - name: Bandit
        run: bandit -r .

      # -----------------------------
      # Tests
      # -----------------------------
      - name: Run tests
        run: pytest -q

      - name: Coverage
        run: |
          coverage run -m pytest
          coverage report
