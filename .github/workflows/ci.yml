name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  checks:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # -----------------------------
      # Install heavy deps (with verbose output)
      # -----------------------------
      - name: Install heavy deps
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary --progress-bar off --verbose numpy pandas matplotlib plotly

      # -----------------------------
      # Install dev deps (with verbose output)
      # -----------------------------
      - name: Install dev deps
        run: |
          pip install --prefer-binary --progress-bar off --verbose ruff mypy pytest bandit coverage pytest-cov

      # -----------------------------
      # Linting
      # -----------------------------
      - name: Ruff (lint + fix)
        run: ruff check . --fix

      # -----------------------------
      # Type checking
      # -----------------------------
      - name: Mypy
        run: mypy

      # -----------------------------
      # Security audit
      # -----------------------------
      - name: Bandit
        run: bandit -r .

      # -----------------------------
      # Tests
      # -----------------------------
      - name: Run tests
        run: pytest -q

      - name: Coverage
        run: |
          coverage run -m pytest
          coverage report
