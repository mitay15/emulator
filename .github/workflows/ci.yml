name: aaps-emulator-tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true

      - name: Run tests with reports
        run: |
          mkdir -p artifacts/html artifacts/plots artifacts/diffs
          pytest \
            --maxfail=1 \
            --disable-warnings \
            --html=artifacts/html/report.html \
            --self-contained-html \
            -m "not visual" \
            tests

      - name: Collect PNG plots
        if: always()
        run: |
          if [ -d "data/plots" ]; then
            cp -r data/plots/* artifacts/plots/ || true
          fi

      - name: Collect JSON diffs
        if: always()
        run: |
          if [ -d "data/cache" ]; then
            cp data/cache/mismatch_block_*.json artifacts/diffs/ 2>/dev/null || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aaps-emulator-artifacts
          path: artifacts
