[pytest]
# Показывать более читаемый вывод
addopts = -ra -q

# Где искать тесты
testpaths =
    tests

# Разрешённые пользовательские метки
markers =
    smoke: быстрые smoke‑тесты (Auto‑GA v3, compare_runner)
    integration: интеграционные тесты (pipeline, cache)
    visual: тесты визуализации (heatmap, predBG)
    unit: юнит‑тесты (kotlin parser, small functions)

# Игнорировать предупреждения
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Кодировка
console_output_style = classic
